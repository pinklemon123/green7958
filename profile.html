<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>个人中心 - 青蓝论坛</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="profile">
    <header class="global-header">
      <button id="menuButton" class="menu-button" type="button" aria-label="打开菜单" aria-expanded="false">
        <span></span>
        <span></span>
      </button>
      <a class="brand" href="index.html" aria-label="青蓝存在主义论坛首页">
        <span class="brand-mark">存</span>
        <span>
          <strong>青蓝论坛</strong>
          <small>个人中心</small>
        </span>
      </a>
      <div class="header-actions">
        <a class="primary-button" href="publish.html">发布文章</a>
      </div>
    </header>

    <div id="menuOverlay" class="menu-overlay" hidden></div>
    <aside id="siteMenu" class="site-menu" aria-label="站点菜单" aria-hidden="true">
      <div class="menu-panel-head">
        <span>导航</span>
        <button id="closeMenu" class="icon-button" type="button" aria-label="关闭菜单">×</button>
      </div>
      <nav class="menu-nav">
        <a href="index.html">主页</a>
        <a href="discussion.html">讨论广场</a>
        <a href="research.html">研究札记</a>
        <a href="articles.html">日常文章</a>
        <a href="translation.html">翻译计划</a>
        <a href="profile.html">个人中心</a>
        <a href="publish.html">发布文章</a>
        <a href="login.html">匿名登录</a>
      </nav>
      <div class="menu-tools">
        <span>界面模式</span>
        <div class="theme-switch" role="group" aria-label="界面模式">
          <button type="button" data-theme-choice="light">白天</button>
          <button type="button" data-theme-choice="dark">黑夜</button>
        </div>
        <a id="loginMenuButton" class="menu-login-button" href="login.html">匿名登录</a>
        <p id="userStatus" class="user-status">未登录</p>
      </div>
    </aside>

    <main>
      <section class="page-hero">
        <p class="eyebrow">Account</p>
        <h1>个人中心</h1>
        <p>查看本地匿名身份、收藏内容和自己发布的文章。后续可替换为真实用户后台。</p>
      </section>

      <section class="content-section profile-grid">
        <aside id="profileCard" class="profile-card"></aside>
        <div class="profile-main">
          <form id="profileForm" class="profile-editor">
            <div class="section-title slim">
              <h2>编辑资料</h2>
            </div>
            <div class="form-grid">
              <label>
                昵称
                <input id="profileName" name="name" type="text" required />
              </label>
              <label>
                头像
                <input id="avatarInput" name="avatar" type="file" accept="image/*" />
              </label>
            </div>
            <label>
              简介
              <textarea id="profileBio" name="bio" rows="4" placeholder="写一点关于你的研究兴趣、日常写作方向或阅读计划"></textarea>
            </label>
            <p id="profileNotice" class="form-note">头像图片小于 5MB。资料暂时保存在本地，后续可接入用户数据库。</p>
            <button class="primary-button" type="submit">保存资料</button>
          </form>
          <div class="section-title slim">
            <h2>我的发布</h2>
          </div>
          <div id="myPosts" class="post-list"></div>
          <div class="section-title slim lower-title">
            <h2>我的收藏</h2>
          </div>
          <div id="favoritePosts" class="post-list"></div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <span>青蓝存在主义论坛</span>
      <span>Profile</span>
    </footer>

    <script src="data.js"></script>
    <script src="script.js"></script>
  </body>
</html>
