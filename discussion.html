<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>讨论广场 - 青蓝论坛</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="discussion">
    <header class="global-header">
      <button id="menuButton" class="menu-button" type="button" aria-label="打开菜单" aria-expanded="false">
        <span></span>
        <span></span>
      </button>
      <a class="brand" href="index.html" aria-label="青蓝存在主义论坛首页">
        <span class="brand-mark">存</span>
        <span>
          <strong>青蓝论坛</strong>
          <small>讨论广场</small>
        </span>
      </a>
      <div class="header-actions">
        <label class="header-search">
          <span>搜索</span>
          <input id="siteSearch" type="search" placeholder="搜索帖子" />
        </label>
        <a class="primary-button" href="publish.html">发布</a>
      </div>
    </header>

    <div id="menuOverlay" class="menu-overlay" hidden></div>
    <aside id="siteMenu" class="site-menu" aria-label="站点菜单" aria-hidden="true">
      <div class="menu-panel-head">
        <span>导航</span>
        <button id="closeMenu" class="icon-button" type="button" aria-label="关闭菜单">×</button>
      </div>
      <nav class="menu-nav">
        <a href="index.html">主页</a>
        <a href="discussion.html">讨论广场</a>
        <a href="research.html">研究札记</a>
        <a href="articles.html">日常文章</a>
        <a href="translation.html">翻译计划</a>
        <a href="profile.html">个人中心</a>
        <a href="publish.html">发布文章</a>
        <a href="login.html">匿名登录</a>
      </nav>
      <div class="menu-tools">
        <span>界面模式</span>
        <div class="theme-switch" role="group" aria-label="界面模式">
          <button type="button" data-theme-choice="light">白天</button>
          <button type="button" data-theme-choice="dark">黑夜</button>
        </div>
        <a id="loginMenuButton" class="menu-login-button" href="login.html">匿名登录</a>
        <p id="userStatus" class="user-status">未登录</p>
      </div>
    </aside>

    <main>
      <section class="page-hero">
        <p class="eyebrow">Forum</p>
        <h1>讨论广场</h1>
        <p>汇总本周热门问题、回复和待展开的讨论。</p>
      </section>

      <section class="media-section page-media">
        <div id="pageGallery" class="image-strip" data-gallery="discussion"></div>
      </section>

      <section class="content-section">
        <div class="section-toolbar">
          <div class="tabs" role="tablist" aria-label="帖子筛选">
            <button class="tab active" type="button" data-filter="all">全部</button>
            <button class="tab" type="button" data-filter="research">研究</button>
            <button class="tab" type="button" data-filter="daily">日常</button>
            <button class="tab" type="button" data-filter="translation">翻译</button>
          </div>
          <select id="sortSelect" aria-label="排序">
            <option value="hot">热度</option>
            <option value="new">最新</option>
            <option value="deep">深度</option>
          </select>
        </div>
        <div id="postList" class="post-list"></div>
      </section>
    </main>

    <footer class="site-footer">
      <span>青蓝存在主义论坛</span>
      <span>Discussion</span>
    </footer>

    <script src="data.js"></script>
    <script src="script.js"></script>
  </body>
</html>
