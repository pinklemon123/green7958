services:
  postgres:
    image: postgres:16-alpine
    container_name: greenparty-postgres
    environment:
      POSTGRES_USER: greenparty
      POSTGRES_PASSWORD: greenparty-change-this-password
      POSTGRES_DB: greenparty
    volumes:
      - greenparty-postgres:/var/lib/postgresql/data
    restart: unless-stopped

  greenparty-forum:
    build: .
    container_name: greenparty-forum
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      DB_FILE: "/data/db.json"
      DATABASE_URL: "postgres://greenparty:greenparty-change-this-password@postgres:5432/greenparty"
      ADMIN_USER: "adminxxx"
      ADMIN_PASSWORD: "2430350396"
    volumes:
      - greenparty-data:/data
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  greenparty-data:
  greenparty-postgres:
