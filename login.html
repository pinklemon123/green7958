<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>匿名登录 - 青蓝论坛</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="login">
    <header class="global-header">
      <button id="menuButton" class="menu-button" type="button" aria-label="打开菜单" aria-expanded="false">
        <span></span>
        <span></span>
      </button>
      <a class="brand" href="index.html" aria-label="青蓝存在主义论坛首页">
        <span class="brand-mark">存</span>
        <span>
          <strong>青蓝论坛</strong>
          <small>匿名登录</small>
        </span>
      </a>
      <div class="header-actions">
        <a class="primary-button" href="index.html">返回主页</a>
      </div>
    </header>

    <div id="menuOverlay" class="menu-overlay" hidden></div>
    <aside id="siteMenu" class="site-menu" aria-label="站点菜单" aria-hidden="true">
      <div class="menu-panel-head">
        <span>导航</span>
        <button id="closeMenu" class="icon-button" type="button" aria-label="关闭菜单">×</button>
      </div>
      <nav class="menu-nav">
        <a href="index.html">主页</a>
        <a href="discussion.html">讨论广场</a>
        <a href="research.html">研究札记</a>
        <a href="articles.html">日常文章</a>
        <a href="translation.html">翻译计划</a>
        <a href="profile.html">个人中心</a>
        <a href="publish.html">发布文章</a>
        <a href="login.html">匿名登录</a>
      </nav>
      <div class="menu-tools">
        <span>界面模式</span>
        <div class="theme-switch" role="group" aria-label="界面模式">
          <button type="button" data-theme-choice="light">白天</button>
          <button type="button" data-theme-choice="dark">黑夜</button>
        </div>
        <p id="userStatus" class="user-status">未登录</p>
      </div>
    </aside>

    <main>
      <section class="login-page">
        <form id="loginForm" class="login-card page-login-card">
          <p class="eyebrow">Local Login</p>
          <h1>匿名登录</h1>
          <p>当前只是前端演示，不连接服务器或数据库。你可以随便填写名字和密码，后续接后端时再替换为真实认证。</p>
          <label>
            名字
            <input id="loginName" name="name" type="text" autocomplete="nickname" required />
          </label>
          <label>
            密码
            <input id="loginPassword" name="password" type="password" autocomplete="current-password" required />
          </label>
          <button class="primary-button" type="submit">进入论坛</button>
          <button id="logoutButton" class="secondary-button" type="button">退出当前登录</button>
        </form>
      </section>
    </main>

    <footer class="site-footer">
      <span>青蓝存在主义论坛</span>
      <span>Login</span>
    </footer>

    <script src="data.js"></script>
    <script src="script.js"></script>
  </body>
</html>
